- title: "PlotEverything"
  i18n_key: "app.ploteverything"
  cover: "/assets/images/covers/PlotEverything.jpg"
  pub: "App Windows&macOS"
  pub_date: "Nature-style plots without expertise"
  abstract: >-
    PlotEverything is a lightweight scientific figure workspace. It helps users create publication-style figures from spreadsheet data, display crystal structures, simulate XRD patterns, arrange multi-panel figures, and export final images without writing plotting code.
  links:
    Install: "https://github.com/Bin-Cao/PlotEverything/releases"
    Manual: "https://bin-cao.github.io/PlotEverything/"
    Project: "https://github.com/Bin-Cao/PlotEverything"





- title: "XMatcher"
  i18n_key: "app.xmatcher"
  cover: "/assets/images/covers/XMatcher.jpg"
  pub: "App Windows&macOS"
  pub_date: "XRD Phase Matching"
  abstract: >-
    XMatcher is a app toolkit for experimental X-ray diffraction (XRD) phase matching against precomputed crystal-structure databases. It is designed around a production workflow: build a searchable theoretical peak database once, then perform fast and explainable retrieval for experimental patterns.
  links:
    Install: "https://doi.org/10.6084/m9.figshare.32812985"
    Manual: "https://asterbin.github.io/Asterbin-XMatcher"
    Project: "https://github.com/Asterbin/Asterbin-XMatcher"


- title: "TabularLab"
  i18n_key: "app.tabularlab"
  cover: "/assets/images/covers/TabularLab.jpg"
  pub: "App Windows&macOS"
  pub_date: "Tabular Machine Learning"
  abstract: >-
    TabularLab is a lightweight toolkit for tabular machine learning. It can be used as a desktop app or opened in a browser, and supports regression, classification, clustering, visualization, prediction, and result export.
  links:
    Install: "https://github.com/Bin-Cao/TabularLab/releases"
    Manual: "https://bin-cao.github.io/TabularLab/"
    Project: "https://github.com/Bin-Cao/TabularLab"


- title: "XQueryer"
  i18n_key: "app.xqueryer"
  cover: "/assets/images/covers/XQueryer_web.jpg"
  pub: "Website"
  pub_date: "Online PXRD Analysis"
  abstract: >-
    Initially developed as a web platform for XQueryer, it has gradually evolved into a comprehensive framework for crystal analysis, including high-throughput simulation, single- and multi-phase identification, and diffraction pattern refinement.
  links:
    Website: "https://xqueryer.caobin.asia/"
    Project: "https://doi.org/10.13140/RG.2.2.36041.30568"
