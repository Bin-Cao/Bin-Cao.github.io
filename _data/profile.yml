short_bio: >-
      <p>
        I am a <strong>Research Scientist</strong> at Huawei 
        <a href="https://www.noahlab.com.hk/" style="color: #66bb6a;">Noah’s Ark Lab</a> (London Research Center). 
        My research focuses on AI for materials science, with an emphasis on developing algorithms for crystallography and spectroscopy using graph representation learning and Bayesian optimization.
        </p>

        <p>
        My research interest in this area has been shaped through a combination of interdisciplinary training and research experience across academia and industry. I received my Ph.D. from 
        <a href="https://www.hkust-gz.edu.cn/" style="color: #66bb6a;">The Hong Kong University of Science and Technology</a> (Guangzhou Campus), where I worked with 
        <a href="https://english.casad.cas.cn/members/casm/dots/202404/t20240418_660476.html" style="color: #66bb6a;">Prof. Tong-Yi Zhang</a>. 
        During my Ph.D., I was also a visiting student at 
        <a href="https://www.cityu.edu.hk/" style="color: #66bb6a;">City University of Hong Kong</a>, working with 
        <a href="https://scholars.cityu.edu.hk/en/persons/yangren/" style="color: #66bb6a;">Prof. Yang Ren</a>, 
        and gained industry research experience through internships at 
        <a href="https://www.shlab.org.cn/" style="color: #66bb6a;">Shanghai AI Lab</a> and 
        <a href="https://www.greendynamics.com.au/" style="color: #66bb6a;">GreenDynamics</a>.
        </p>

        <p>
        Prior to my Ph.D., I obtained an MPhil in Mechanics from 
        <a href="https://www.shu.edu.cn/" style="color: #66bb6a;">Shanghai University</a> under the supervision of 
        <a href="https://english.casad.cas.cn/members/casm/dots/202404/t20240418_660476.html" style="color: #66bb6a;">Prof. Tong-Yi Zhang</a>, 
        where I worked on transfer learning for materials science during an internship at 
        <a href="https://www.zhejianglab.org/" style="color: #66bb6a;">Zhejiang Laboratory</a>. 
        I received my BEng in Chemical Machinery from 
        <a href="https://www.buct.edu.cn/main.htm" style="color: #66bb6a;">Beijing University of Chemical Technology</a>, 
        with a focus on finite element methods and chemistry.
        </p>

        <p>
        I have developed a series of machine learning methods for key problems in X-ray diffraction (XRD) and crystal analysis, including large-scale XRD pattern simulation 
        (<a href="https://github.com/Bin-Cao/SimXRD" style="color: #66bb6a;">SimXRD</a>), 
        crystal structure determination 
        (<a href="https://github.com/Bin-Cao/XQueryer" style="color: #66bb6a;">XQueryer</a>), 
        XRD pattern refinement 
        (<a href="https://github.com/Bin-Cao/PyWPEM" style="color: #66bb6a;">WPEM</a>), 
        and crystal property prediction 
        (<a href="https://github.com/Bin-Cao/PRDNet" style="color: #66bb6a;">PRDNet</a>). 
        In addition, I developed one of the first Bayesian optimization frameworks for materials discovery, 
        <a href="https://github.com/Bin-Cao/Bgolearn" style="color: #66bb6a;">Bgolearn</a>, 
        which has been selected for support under the Open Source Project Program of the Shanghai Municipal Commission of Economy and Informatization.
        </p>

        <p>
        Outside of research, I enjoy jogging and going to the gym.
        </p>
        
      <p>
        I serve as a reviewer for 
        <a href="https://iclr.cc/" target="_blank">ICLR</a>, 
        <a href="https://neurips.cc/" target="_blank">NeurIPS</a>, 
        <a href="https://icml.cc/" target="_blank">ICML</a>,
        <a href="https://aaai.org/" target="_blank">AAAI</a>,
        <a href="https://www.kdd.org/" target="_blank">KDD</a>, and 
        <a href="https://www.sciencedirect.com/journal/engineering-applications-of-artificial-intelligence" target="_blank">
          Engineering Applications of Artificial Intelligence (EAAI)
        </a>.
      </p>

      


