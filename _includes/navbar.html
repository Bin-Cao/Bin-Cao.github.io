<nav class="navbar navbar-expand-sm navbar-dark bg-dark fixed-top mb-5 shadow-sm">
    <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %}">
        <a class="navbar-brand"><strong>{{site.data.profile.navbar_name}}</strong></a>
        <button class="navbar-toggler" style="font-size: 1em; padding: 0.5em;" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            <i class="fas fa-map"></i> <span data-i18n="nav.menu">Menu</span>
        </button>

        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ml-auto">
                {% for item in site.data.navigation.pages %}
                <li class="nav-item {% if item.name == page.navbar_title %}active{% endif %}">
                    <a class="nav-link" href="{{ item.url | relative_url }}" data-i18n="nav.{{ item.name | slugify }}">{{ item.name }}</a>
                </li>
                {% endfor %}
            </ul>
            <div class="language-switcher ml-sm-3" aria-label="Language selector">
                <button type="button" class="language-option is-active" data-lang-switch="en">EN</button>
                <button type="button" class="language-option" data-lang-switch="zh">中</button>
                <button type="button" class="language-option" data-lang-switch="ja">日</button>
                <button type="button" class="language-option" data-lang-switch="ko">한</button>
                <button type="button" class="language-option" data-lang-switch="de">DE</button>
            </div>
        </div>
    </div>
</nav>
